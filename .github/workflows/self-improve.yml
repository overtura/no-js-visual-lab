name: Self Improve

on:
  workflow_dispatch:
    inputs:
      focus:
        description: "이번 자가 개선 초점"
        required: true
        default: visual
        type: choice
        options:
          - planning
          - feature
          - design
          - visual
          - workflow
          - docs
          - accessibility
          - performance
      instruction:
        description: "이번 루프에 반영할 추가 지시사항"
        required: false
        default: ""
      model:
        description: "GitHub Models 모델 ID"
        required: true
        default: openai/gpt-4o
      auto_merge:
        description: "guard/check 통과 후 PR 자동 squash merge"
        required: true
        default: true
        type: boolean
  schedule:
    - cron: "17 18 * * 1"

permissions:
  contents: write
  pull-requests: write
  issues: write
  models: read

concurrency:
  group: self-improve-${{ github.repository }}
  cancel-in-progress: false

jobs:
  improve:
    name: Create, verify, and merge self-improvement PR
    runs-on: ubuntu-latest
    env:
      SELF_IMPROVE_FOCUS: ${{ github.event.inputs.focus || 'visual' }}
      SELF_IMPROVE_INSTRUCTION: ${{ github.event.inputs.instruction || '' }}
      SELF_IMPROVE_MODEL: ${{ github.event.inputs.model || 'openai/gpt-4o' }}
      SELF_IMPROVE_AUTO_MERGE: ${{ github.event.inputs.auto_merge || 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install
        run: |
          corepack enable
          pnpm install --frozen-lockfile || pnpm install

      - name: Verify repository automation permissions
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          permissions="$(gh api "repos/${GITHUB_REPOSITORY}/actions/permissions/workflow")"
          default_permission="$(jq -r .default_workflow_permissions <<<"$permissions")"
          can_approve="$(jq -r .can_approve_pull_request_reviews <<<"$permissions")"
          if [ "$default_permission" != "write" ]; then
            echo "::error::Actions GITHUB_TOKEN write 권한이 필요합니다."
            exit 1
          fi
          if [ "$can_approve" != "true" ]; then
            echo "::warning::Actions PR approval 권한이 꺼져 있습니다. 보호 규칙이 생기면 자동 merge가 막힐 수 있습니다."
          fi

      - name: Build self-improvement context
        run: pnpm self-improve:context

      - name: Ask GitHub Models for a safe patch
        id: inference
        uses: actions/ai-inference@v1
        with:
          model: ${{ env.SELF_IMPROVE_MODEL }}
          system-prompt-file: .github/prompts/self-improve-system.md
          prompt-file: .self-improvement/prompt.md
          max-completion-tokens: 6000
          temperature: 0.2

      - name: Apply AI patch
        run: node scripts/apply-ai-patch.mjs "${{ steps.inference.outputs.response-file }}"

      - name: Guard generated changes
        run: pnpm self-improve:guard

      - name: Check
        run: pnpm check

      - name: Detect changes
        id: diff
        shell: bash
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare labels
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create self-improve --color 5319e7 --description "자가 개선 자동화가 생성한 PR" || true
          gh label create automerge --color 0e8a16 --description "guard/check 통과 후 자동 merge 대상" || true

      - name: Create PR and optionally merge
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          branch="self-improve/${SELF_IMPROVE_FOCUS}-${GITHUB_RUN_ID}"
          title="[feat] 자가 개선 ${SELF_IMPROVE_FOCUS} 반영"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add -A
          git commit -m "$title"
          git push --set-upstream origin "$branch"
          cat > .self-improvement/pr-body.md <<BODY
          ## 목적
          자가 개선 루프가 \`${SELF_IMPROVE_FOCUS}\` 초점으로 생성한 변경을 반영합니다.

          ## 루프 입력
          - focus: \`${SELF_IMPROVE_FOCUS}\`
          - instruction: \`${SELF_IMPROVE_INSTRUCTION:-없음}\`
          - model: \`${SELF_IMPROVE_MODEL}\`

          ## 검증
          - [x] self-improve guard
          - [x] \`pnpm check\`

          ## 안전 장치
          - 민감 파일, secret 패턴, 위험 workflow 패턴을 guard에서 차단했습니다.
          - 적용 가능한 unified diff가 없으면 PR을 만들지 않습니다.

          ## merge 판단
          - recommend
          BODY
          pr_url="$(gh pr create --title "$title" --body-file .self-improvement/pr-body.md --label self-improve --label automerge)"
          echo "Created $pr_url"
          if [ "$SELF_IMPROVE_AUTO_MERGE" = "true" ]; then
            gh pr merge "$pr_url" --squash --delete-branch --subject "$title" --body "self-improve guard와 pnpm check 통과 후 자동 merge"
          fi

      - name: No changes
        if: steps.diff.outputs.changed == 'false'
        run: echo "적용 가능한 자가 개선 변경이 없어 종료합니다."
